<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafariYaMama Chat</title>
    <link rel="stylesheet" href="style1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="chat-page">

    <div class="chat-wrapper">
        <header class="chat-header">
            <a href="homepage.html" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="header-info">
                <h1>SafariYaMama Chat 🌸</h1>
                <p>Your caring companion 🌷</p>
            </div>
        </header>

        <div class="chat-window" id="chatWindow">
            <div class="msg bot-msg">
                Hello! 👋 Welcome to SafariYaMama. I'm here to support you through your pregnancy journey. How can I help you today? 💕
            </div>
            
            </div>

        <div class="input-section">
            <div class="input-pill">
                <input type="text" placeholder="Type your message... 🌿" id="userMsgInput">
            </div>
            <button class="send-btn" id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
async function sendMessage() {
    let inputBox = document.getElementById("user-input");
    let message = inputBox.value;

    // display user message
    addMessage("user", message);

    // send to Flask
    let response = await fetch("http://127.0.0.1:5000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    });

    let data = await response.json();

    // display bot response and show sources of answers
    addMessage("bot", data.response + "\nSources: " + data.sources.join(", "));

    inputBox.value = "";
}
</script>

<script>
function addMessage(sender, text) {
    let chatBox = document.getElementById("chat-box");

    let messageDiv = document.createElement("div");
    messageDiv.className = sender;

    messageDiv.innerText = text;

    chatBox.appendChild(messageDiv);
}
</script>


</body>
</html>
