<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafariYaMama</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts (for similar look) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">

        <!-- Top Image -->
        <div class="image-container">
            <img src="momandchild.jpg" alt="Mother and Child">
        </div>

        <!-- Title -->
        <h1 class="title">
            SafariYaMama <span class="flower">🌸</span>
        </h1>

        <!-- Subtitle -->
        <p class="subtitle">
            YOUR MATERNAL HEALTH COMPANION 💕
        </p>

        <!-- Description -->
        <p class="description">
            Helping mothers and being their trusted guide through pregnancy
            and maternal health 🌷 — from the first heartbeat to the first cry,
            <span class="brand">SafariYaMama</span> walks every step with you.
        </p>

        <!-- Button -->
        <button class="chat-btn">
            🌼 Start Chat →
        </button>

        <!-- Footer -->
        <p class="footer">
            🌿 Made with love for every mama 🌿
        </p>

    </div>

</body>
</html>
